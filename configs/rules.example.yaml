# `id` is optional on input. These sample IDs are shown for readability and are
# preserved if provided.
rules:
  - id: 1001
    name: observe_tcp_syn_80
    enabled: true
    priority: 100
    match:
      dst_ports: [80]
      protocol: tcp
      tcp_flags:
        syn: true
    response:
      action: tcp_reset

  - id: 1002
    name: observe_tcp_syn_5555
    enabled: true
    priority: 110
    match:
      dst_ports: [5555]
      protocol: tcp
      tcp_flags:
        syn: true
    response:
      action: tcp_reset

  - id: 1003
    name: observe_tcp_syn_src_prefix
    enabled: true
    priority: 120
    match:
      src_prefixes: [10.1.0.0/16]
      protocol: tcp
      tcp_flags:
        syn: true
    response:
      action: tcp_reset

  - id: 1004
    name: observe_tcp_syn_dst_prefix_host
    enabled: true
    priority: 130
    match:
      dst_prefixes: [192.168.1.69/32]
      protocol: tcp
      tcp_flags:
        syn: true
    response:
      action: tcp_reset

  - id: 1005
    name: observe_tcp_syn_dst_prefix_subnet
    enabled: true
    priority: 140
    match:
      dst_prefixes: [192.168.1.0/24]
      protocol: tcp
      tcp_flags:
        syn: true
    response:
      action: tcp_reset

  - id: 1006
    name: observe_tcp_syn_src_port_12345
    enabled: true
    priority: 150
    match:
      src_ports: [12345]
      protocol: tcp
      tcp_flags:
        syn: true
    response:
      action: tcp_reset

  - id: 1007
    name: observe_tcp_syn_src_prefix_to_80
    enabled: true
    priority: 160
    match:
      src_prefixes: [10.1.0.0/16]
      dst_ports: [80]
      protocol: tcp
      tcp_flags:
        syn: true
    response:
      action: tcp_reset

  - id: 1008
    name: observe_tcp_syn_vlan_100
    enabled: true
    priority: 170
    match:
      vlans: [100]
      protocol: tcp
      tcp_flags:
        syn: true
    response:
      action: tcp_reset
