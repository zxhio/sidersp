# Minimal local config for the first control-plane skeleton.
controlplane:
  rules_path: configs/rules.example.yaml

dataplane:
  interface: eth0
  attach_mode: generic

response:
  enabled: false
  queues: [0]
  result_buffer_size: 1024
  hardware_addr: ""
  tcp_seq: 1

console:
  listen_addr: 127.0.0.1:8080
  stats_history:
    windows:
      - name: 10min
        window: 10m
        step: 10s
        limit: 60
      - name: 1d
        window: 24h
        step: 5m
        limit: 288
      - name: 30d
        window: 720h
        step: 1h
        limit: 720
