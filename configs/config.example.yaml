# Minimal local config for the first control-plane skeleton.
controlplane:
  rules_path: configs/rules.example.yaml

dataplane:
  interface: eth0
  attach_mode: generic

response:
  enabled: false
  tcp_reset:
    # Values: "" for same-interface XDP_TX, or an interface name for egress XDP_REDIRECT.
    egress_interface: ""
    # Values: preserve, access. preserve keeps one 802.1Q tag; access strips it.
    vlan_mode: preserve
    # Values: pass, drop. Mirror-port deployments commonly use drop.
    failure_verdict: pass
  queues: [0]
  result_buffer_size: 1024
  hardware_addr: ""
  tcp_seq: 1
  frame_size: 4096
  frame_count: 4096
  fill_ring_size: 2048
  completion_ring_size: 2048
  rx_ring_size: 2048
  tx_ring_size: 2048
  tx_frame_reserve: 256

logging:
  level: info
  file_path: /var/log/sidersp/sidersp.log
  max_size_mb: 100
  max_backups: 7
  max_age_days: 30
  compress: true

console:
  listen_addr: 127.0.0.1:8080
  stats_history:
    windows:
      - name: 10min
        window: 10m
        step: 10s
        limit: 60
      - name: 1d
        window: 24h
        step: 5m
        limit: 288
      - name: 30d
        window: 720h
        step: 1h
        limit: 720
