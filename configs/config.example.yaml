# Minimal local config for the first control-plane skeleton.
controlplane:
  rules_path: configs/rules.example.yaml

dataplane:
  interface: eth0
  attach_mode: generic
  # Optional: set NIC combined channels before dataplane attach. 0 keeps the current host setting.
  combined_channels: 0
  # Values: pass, drop. pass keeps unmatched/non-consumed packets in the host stack.
  # Use drop on dedicated mirror ports; use pass on host-firewall or protocol-stack-integrated deployments.
  ingress_verdict: pass

egress:
  # Values: "" for same-interface XDP_TX / XSK TX, or an interface name for shared egress transmission.
  interface: ""
  # Values: preserve, access. preserve keeps one 802.1Q tag; access strips it.
  vlan_mode: preserve
  # Values: pass, drop. Mirror-port deployments commonly use drop.
  failure_verdict: pass

response:
  runtime:
    enabled: false
    # Optional: when omitted, the runtime uses queues [0] by default, or [0..combined_channels-1]
    # if dataplane.combined_channels is set to a positive value.
    queues: [0]
    result_buffer_size: 1024
    afxdp:
      frame_size: 4096
      frame_count: 4096
      fill_ring_size: 2048
      completion_ring_size: 2048
      rx_ring_size: 2048
      tx_ring_size: 2048
      tx_frame_reserve: 256

logging:
  app:
    level: info
    file_path: /var/log/sidersp/sidersp.log
    max_size_mb: 100
    max_backups: 7
    max_age_days: 30
    compress: true
  stats:
    level: info
    file_path: /var/log/sidersp/sidersp.stats.log
    max_size_mb: 100
    max_backups: 7
    max_age_days: 30
    compress: true
  event:
    level: info
    file_path: /var/log/sidersp/sidersp.event.log
    max_size_mb: 100
    max_backups: 7
    max_age_days: 30
    compress: true

console:
  listen_addr: 127.0.0.1:8080
  stats:
    collect_interval: 10s
    retention: 30d
