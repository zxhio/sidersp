name: build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install clang, llvm, and BPF headers
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm linux-libc-dev libbpf-dev

      - name: Export BPF include flags
        run: |
          arch="$(dpkg-architecture -qDEB_HOST_MULTIARCH)"
          echo "BPF2GO_CFLAGS=-I/usr/include/${arch}" >> "$GITHUB_ENV"

      - name: Regenerate dataplane artifacts
        run: go generate ./internal/dataplane

      - name: Check generated files
        run: git diff --exit-code -- internal/dataplane/sidersp_bpfel.go

      - name: Run Go tests
        run: go test ./...

  web:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Build web console
        run: npm --prefix web run build
