name: build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install clang and llvm
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build project
        run: make build-all

      - name: Check generated dataplane artifacts
        run: git diff --exit-code -- internal/dataplane/sidersp_bpfel.go

      - name: Run tests
        run: make test
